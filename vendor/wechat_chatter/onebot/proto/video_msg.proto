syntax = "proto3";

package wxproto;

option go_package = "github.com/yincongcyincong/weixin-macos/onebot/proto;wxproto";

// 发送视频消息的protobuf结构
message WxSendVideoMsg {
  VideoMsgHeader header = 1;
  bytes client_msg_id = 2;
  bytes sender = 3;
  bytes receiver = 4;
  int32 unknown5 = 5;
  int32 unknown6 = 6;
  VideoMsgExtra unknown7 = 7;
  int32 video_size = 8;
  int32 video_size2 = 9;
  VideoMsgExtra unknown10 = 10;
  int32 duration = 11;
  int32 unknown12 = 12;
  int32 unknown13 = 13;
  int32 unknown14 = 14;
  bytes xml = 15;
  bytes cdn_key = 16;
  bytes aes_key = 17;
  int32 unknown18 = 18;
  bytes cdn_key2 = 19;
  int32 unknown20 = 20;
  int32 unknown21 = 21;
  int32 unknown22 = 22;
  bytes aes_key2 = 23;
  // fields 24-25 skipped
  bytes md5_key = 26;
  // fields 27-36 skipped
  bytes video_id = 37;
  int32 unknown38 = 38;
  // fields 39-47 skipped
  bytes md5_key2 = 48;
  bytes cdn_key3 = 49;
  bytes aes_key3 = 50;
  int32 video_size3 = 51;
}

message VideoMsgHeader {
  bytes flag = 1;
  int64 session_id = 2;
  bytes client_proof = 3;
  int64 device_id = 4;
  bytes platform = 5;
  int32 version = 6;
}

message VideoMsgExtra {
  int32 field1 = 1;
  bytes field2 = 2;
}
